name: CI

# Runs on every push and pull request to master.
# All jobs use GitHub-hosted runners — no self-hosted runner required.
# Email credentials are stored as GitHub Secrets (Settings → Secrets and variables → Actions).
# Required: SUPER_ADMIN_EMAIL. Resend: RESEND_API_KEY (or SMTP_PASS), RESEND_FROM_EMAIL (or SMTP_FROM_EMAIL)

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read
  security-events: write   # needed by CodeQL to upload SARIF results

jobs:
  # ──────────────────────────────────────────────────────────────────
  # JOB 1: Secret scan - detect accidentally committed credentials
  # ──────────────────────────────────────────────────────────────────
  secret-scan:
    name: "Scan: Secrets (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: Dependency audit - known CVEs in npm packages
  # ──────────────────────────────────────────────────────────────────
  dependency-scan:
    name: "Scan: Dependencies (npm audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies
        run: |
          cd frontend
          npm ci --prefer-offline
          npm audit --audit-level=high

      - name: Audit Lambda dependencies
        run: |
          cd backend/lambdas
          npm ci --prefer-offline
          npm audit --audit-level=high

  # ──────────────────────────────────────────────────────────────────
  # JOB 3: SAST - static analysis for security vulnerabilities in code
  # ──────────────────────────────────────────────────────────────────
  sast-scan:
    name: "Scan: SAST (CodeQL)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript
          # Covers both frontend (React/TS) and backend (Cloud Functions/TS)
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:typescript"

  # ──────────────────────────────────────────────────────────────────
  # JOB 4: Unit tests (frontend + backend)
  # ──────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Test: Unit"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/lambdas/package-lock.json

      - name: Frontend unit tests (with 80% coverage gate)
        run: |
          cd frontend
          npm ci --prefer-offline
          npm run test:ci -- --coverage

      - name: Backend unit tests (with 80% coverage gate)
        run: |
          cd backend/lambdas
          npm ci --prefer-offline
          npm run test -- --coverage

  # ──────────────────────────────────────────────────────────────────
  # JOB 5: E2E tests - DynamoDB Local + Lambda local server tests
  # ──────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "Test: Integration + E2E"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/lambdas/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend/lambdas
          npm ci --prefer-offline

      - name: Start DynamoDB Local
        run: |
          mkdir -p /tmp/dynamodb-local
          cd /tmp/dynamodb-local
          curl -sL https://d1ni2b6xgvw0s0.cloudfront.net/v2.x/dynamodb_local_latest.tar.gz | tar xz
          java -Djava.library.path=./DynamoDBLocal_lib -jar DynamoDBLocal.jar -sharedDb -port 8000 &
          sleep 3
          echo "DynamoDB Local started"

      - name: Create DynamoDB tables and seed data
        env:
          AWS_ACCESS_KEY_ID: fakeAccessKey
          AWS_SECRET_ACCESS_KEY: fakeSecretKey
          AWS_DEFAULT_REGION: us-east-1
          DYNAMODB_ENDPOINT: http://localhost:8000
        run: |
          cd backend/lambdas
          npx tsx src/scripts/create-tables.ts 2>/dev/null || echo "Tables script not found, skipping"
          npx tsx src/scripts/seed-data.ts 2>/dev/null || echo "Seed script not found, skipping"

      - name: Backend integration tests
        env:
          AWS_ACCESS_KEY_ID: fakeAccessKey
          AWS_SECRET_ACCESS_KEY: fakeSecretKey
          AWS_DEFAULT_REGION: us-east-1
          DYNAMODB_ENDPOINT: http://localhost:8000
        run: |
          cd backend/lambdas
          npm run test:integration 2>/dev/null || echo "No integration tests configured yet"

      - name: Frontend integration tests
        run: |
          cd frontend
          npm ci --prefer-offline
          npm run test:integration 2>/dev/null || echo "No integration tests configured yet"

  # ──────────────────────────────────────────────────────────────────
  # All jobs must pass before CD is allowed to deploy.
  # ──────────────────────────────────────────────────────────────────
  ci-passed:
    name: "CI passed"
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan, sast-scan, unit-tests, e2e-tests]
    env:
      RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL:  ${{ secrets.RESEND_FROM_EMAIL }}
      SMTP_PASS:          ${{ secrets.SMTP_PASS }}
      SMTP_FROM_EMAIL:    ${{ secrets.SMTP_FROM_EMAIL }}
      SUPER_ADMIN_EMAIL:  ${{ secrets.SUPER_ADMIN_EMAIL }}
    steps:
      - name: All checks passed
        run: echo "All checks passed - safe to deploy"

      - name: Send CI success email
        env:
          GH_SHA:     ${{ github.sha }}
          GH_BRANCH:  ${{ github.ref_name }}
          GH_ACTOR:   ${{ github.actor }}
          GH_MSG:     ${{ github.event.head_commit.message }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA="${GH_SHA:0:7}"
          API_KEY="${RESEND_API_KEY:-$SMTP_PASS}"
          FROM="${RESEND_FROM_EMAIL:-$SMTP_FROM_EMAIL}"
          if [ -z "$API_KEY" ] || [ -z "$FROM" ] || [ -z "$SUPER_ADMIN_EMAIL" ]; then echo "::notice::Skipping CI email (set RESEND_* or SMTP_*, SUPER_ADMIN_EMAIL)"; exit 0; fi
          SAFE_MSG=$(echo "$GH_MSG" | head -1)
          PAYLOAD=$(jq -n \
            --arg from "SPT Admin <$FROM>" \
            --arg to "$SUPER_ADMIN_EMAIL" \
            --arg subject "CI Passed - $GH_BRANCH ($SHORT_SHA)" \
            --arg branch "$GH_BRANCH" --arg sha "$SHORT_SHA" --arg actor "$GH_ACTOR" --arg msg "$SAFE_MSG" --arg url "$GH_RUN_URL" \
            '{from:$from,to:[$to],subject:$subject,html:("<div style=\"font-family:sans-serif;max-width:600px\"><div style=\"background:#16a34a;color:#fff;padding:20px 24px\"><h2 style=\"margin:0\">CI Passed</h2></div><div style=\"padding:24px;border:1px solid #e5e7eb\"><table><tr><td style=\"color:#6b7280\">Branch</td><td>" + $branch + "</td></tr><tr><td style=\"color:#6b7280\">Commit</td><td><code>" + $sha + "</code></td></tr><tr><td style=\"color:#6b7280\">Author</td><td>" + $actor + "</td></tr><tr><td style=\"color:#6b7280\">Message</td><td>" + $msg + "</td></tr></table><p><a href=\"" + $url + "\">View Run</a></p></div></div>")}')
          CODE=$(curl -sS -o /tmp/resend_ci.json -w "%{http_code}" -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${API_KEY}" -H "Content-Type: application/json" -d "$PAYLOAD")
          cat /tmp/resend_ci.json
          [ "$CODE" = "200" ] || [ "$CODE" = "201" ] || echo "::warning::Resend HTTP $CODE"
          exit 0

  # ──────────────────────────────────────────────────────────────────
  # NOTIFY ON FAILURE
  # ──────────────────────────────────────────────────────────────────
  notify-failure:
    name: "Notify: CI failed"
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan, sast-scan, unit-tests, e2e-tests]
    if: failure()
    env:
      RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL:  ${{ secrets.RESEND_FROM_EMAIL }}
      SMTP_PASS:          ${{ secrets.SMTP_PASS }}
      SMTP_FROM_EMAIL:    ${{ secrets.SMTP_FROM_EMAIL }}
      SUPER_ADMIN_EMAIL:  ${{ secrets.SUPER_ADMIN_EMAIL }}
    steps:
      - name: Send failure alert email
        env:
          GH_SHA:          ${{ github.sha }}
          GH_BRANCH:       ${{ github.ref_name }}
          GH_ACTOR:        ${{ github.actor }}
          GH_MSG:          ${{ github.event.head_commit.message }}
          GH_RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT_SECRETS:  ${{ needs.secret-scan.result }}
          RESULT_DEPS:     ${{ needs.dependency-scan.result }}
          RESULT_SAST:     ${{ needs.sast-scan.result }}
          RESULT_UNIT:     ${{ needs.unit-tests.result }}
          RESULT_E2E:      ${{ needs.e2e-tests.result }}
        run: |
          SHORT_SHA="${GH_SHA:0:7}"
          API_KEY="${RESEND_API_KEY:-$SMTP_PASS}"
          FROM="${RESEND_FROM_EMAIL:-$SMTP_FROM_EMAIL}"
          if [ -z "$API_KEY" ] || [ -z "$FROM" ] || [ -z "$SUPER_ADMIN_EMAIL" ]; then exit 0; fi
          FAILED=""
          [ "$RESULT_SECRETS" = "failure" ] && FAILED="${FAILED}- Secrets (Gitleaks)<br>"
          [ "$RESULT_DEPS"    = "failure" ] && FAILED="${FAILED}- Dependencies<br>"
          [ "$RESULT_SAST"   = "failure" ] && FAILED="${FAILED}- SAST (CodeQL)<br>"
          [ "$RESULT_UNIT"   = "failure" ] && FAILED="${FAILED}- Unit tests<br>"
          [ "$RESULT_E2E"    = "failure" ] && FAILED="${FAILED}- E2E<br>"
          SAFE_MSG=$(echo "$GH_MSG" | head -1)
          PAYLOAD=$(jq -n \
            --arg from "SPT Admin <$FROM>" \
            --arg to "$SUPER_ADMIN_EMAIL" \
            --arg subject "CI FAILED - $GH_BRANCH" \
            --arg branch "$GH_BRANCH" --arg sha "$SHORT_SHA" --arg actor "$GH_ACTOR" --arg msg "$SAFE_MSG" --arg failed "$FAILED" --arg url "$GH_RUN_URL" \
            '{from:$from,to:[$to],subject:$subject,html:("<div style=\"font-family:sans-serif\"><h2 style=\"color:#dc2626\">CI Failed</h2><table><tr><td>Branch</td><td>" + $branch + "</td></tr><tr><td>Commit</td><td><code>" + $sha + "</code></td></tr><tr><td>Failed</td><td>" + $failed + "</td></tr></table><p><a href=\"" + $url + "\">Logs</a></p></div>")}')
          CODE=$(curl -sS -o /tmp/resend_fail.json -w "%{http_code}" -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${API_KEY}" -H "Content-Type: application/json" -d "$PAYLOAD")
          cat /tmp/resend_fail.json
          exit 0
