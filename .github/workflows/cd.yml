name: CD - Deploy to Production

# ─────────────────────────────────────────────────────────────────────────────
# Runs on GitHub-hosted runners — no self-hosted runner required.
# All credentials are stored as GitHub Secrets (Settings → Secrets → Actions).
#
# Triggers automatically after the CI workflow passes on master.
# 1. Builds the React frontend with production AWS config
# 2. Syncs built assets to S3 (hashed files: long cache; index.html: no-cache)
# 3. Invalidates CloudFront so changes go live within ~60 seconds
# 4. Builds and deploys Lambda functions to AWS
# 5. Sends a success or failure email via Resend
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#   S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID
#   LAMBDA_DEPLOY_BUCKET (S3 bucket for Lambda zips)
#   LAMBDA_PREFIX (function name prefix, default: peertutor)
#   SENTRY_DSN (backend Sentry)
#   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, SMTP_FROM_EMAIL, SMTP_FROM_NAME
#   SUPER_ADMIN_EMAIL
#   GOOGLE_CALENDAR_CLIENT_EMAIL, GOOGLE_CALENDAR_PRIVATE_KEY (PEM, multiline OK in GH)
#   GOOGLE_CALENDAR_ID (optional)
#   ANTHROPIC_API_KEY (optional — tutor recommendations)
#   COGNITO_USER_POOL_ID, COGNITO_APP_CLIENT_ID (from terraform output)
#   COGNITO_AWS_ACCESS_KEY_ID, COGNITO_AWS_SECRET_ACCESS_KEY (IAM user for backend admin ops)
#   Optional frontend: VITE_SENTRY_DSN, VITE_RECAPTCHA_SITE_KEY (App Check)
#   Deploy emails (Resend REST API): RESEND_API_KEY (re_... recommended). Optional RESEND_FROM_EMAIL
#   (use onboarding@resend.dev until your domain is verified at resend.com).
#   IAM permissions needed: lambda:UpdateFunctionCode, s3:PutObject on Lambda bucket
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  # Manual trigger — use when you want to redeploy without a new commit.
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy (leave blank for latest master)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  deploy:
    name: "Deploy: S3 + CloudFront + Lambda"
    runs-on: ubuntu-latest
    # Auto: deploy when triggering CI succeeded. Manual dispatch: always. Re-runs: workflow_run payload is often empty on "Re-run jobs" — run_attempt>1 fixes skipped redeploys.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || github.run_attempt > 1 }}
    env:
      AWS_ACCESS_KEY_ID:            ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:        ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:           ${{ secrets.AWS_REGION }}
      S3_BUCKET:                    ${{ secrets.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID:   ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
      LAMBDA_DEPLOY_BUCKET:         ${{ secrets.LAMBDA_DEPLOY_BUCKET }}
      SMTP_PASS:                    ${{ secrets.SMTP_PASS }}
      SMTP_FROM_EMAIL:              ${{ secrets.SMTP_FROM_EMAIL }}
      SUPER_ADMIN_EMAIL:            ${{ secrets.SUPER_ADMIN_EMAIL }}
      RESEND_API_KEY:               ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL:            ${{ secrets.RESEND_FROM_EMAIL }}

    steps:
      # ── Checkout the exact commit that passed CI ───────────────────────────
      - uses: actions/checkout@v4
        with:
          # workflow_run: use the SHA that passed CI.
          # workflow_dispatch: use the provided SHA or fall back to HEAD.
          ref: ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/lambdas/package-lock.json

      # ── Build frontend ─────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL:              ${{ secrets.API_GATEWAY_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID:    ${{ secrets.COGNITO_APP_CLIENT_ID }}
          VITE_AWS_REGION:           ${{ secrets.AWS_REGION }}
          VITE_GIT_SHA:              ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}
          VITE_SENTRY_DSN:           ${{ secrets.VITE_SENTRY_DSN }}
          VITE_RECAPTCHA_SITE_KEY:   ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
        run: npm run build

      # ── Deploy to S3 ──────────────────────────────────────────────────────
      - name: Sync hashed assets to S3 (long-lived cache)
        run: |
          aws s3 sync frontend/dist/ "s3://$S3_BUCKET/" \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.map"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp frontend/dist/index.html "s3://$S3_BUCKET/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      # ── Invalidate CloudFront ─────────────────────────────────────────────
      - name: Invalidate CloudFront cache
        id: invalidate
        run: |
          CF_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "invalidation_id=$CF_ID" >> "$GITHUB_OUTPUT"
          echo "CloudFront invalidation: $CF_ID"

      # ── Build Lambda functions ──────────────────────────────────────────
      - name: Install Lambda dependencies
        working-directory: backend/lambdas
        run: npm ci --prefer-offline

      - name: Build Lambda zips
        run: bash scripts/build-lambdas.sh

      - name: Deploy Lambda functions
        env:
          LAMBDA_BUCKET: ${{ secrets.LAMBDA_DEPLOY_BUCKET }}
          LAMBDA_PREFIX: ${{ secrets.LAMBDA_PREFIX || 'peertutor' }}
        run: |
          if [ -z "$LAMBDA_BUCKET" ]; then
            echo "::notice::Skipping Lambda deploy — set LAMBDA_DEPLOY_BUCKET secret to enable"
            exit 0
          fi

          echo "Uploading Lambda zips to S3..."
          for zip in backend/lambdas/dist/*.zip; do
            GROUP=$(basename "$zip" .zip)
            aws s3 cp "$zip" "s3://$LAMBDA_BUCKET/lambdas/$GROUP.zip"
            echo "  Uploaded $GROUP.zip"
          done

          echo "Updating Lambda functions..."
          for group in auth bookings schools reviews misc scheduled; do
            FUNC_NAME="${LAMBDA_PREFIX}-${group}"
            echo "  Updating $FUNC_NAME..."
            aws lambda update-function-code \
              --function-name "$FUNC_NAME" \
              --s3-bucket "$LAMBDA_BUCKET" \
              --s3-key "lambdas/$group.zip" \
              --query "LastModified" \
              --output text || echo "::warning::Failed to update $FUNC_NAME"
          done
          echo "Lambda deploy complete"

      # ── Notify success ────────────────────────────────────────────────────
      - name: Send deployment success email
        if: success()
        env:
          GH_SHA:     ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}
          GH_TITLE:   ${{ github.event.workflow_run.display_title || 'manual dispatch' }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CF_ID:      ${{ steps.invalidate.outputs.invalidation_id }}
        run: |
          SHORT_SHA="${GH_SHA:0:7}"
          API_KEY="${RESEND_API_KEY:-$SMTP_PASS}"
          FROM="${RESEND_FROM_EMAIL:-$SMTP_FROM_EMAIL}"
          if [ -z "$API_KEY" ] || [ -z "$FROM" ] || [ -z "$SUPER_ADMIN_EMAIL" ]; then
            echo "::notice::Skipping deploy email (set RESEND_API_KEY, RESEND_FROM_EMAIL or SMTP_*, SUPER_ADMIN_EMAIL)"
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg from "SPT Admin <$FROM>" \
            --arg to "$SUPER_ADMIN_EMAIL" \
            --arg subject "Deployed to Production - $SHORT_SHA" \
            --arg sha "$SHORT_SHA" \
            --arg title "$GH_TITLE" \
            --arg cf "$CF_ID" \
            --arg url "$GH_RUN_URL" \
            '{
              from: $from,
              to: [$to],
              subject: $subject,
              html: ("<div style=\"font-family:sans-serif;max-width:600px\"><div style=\"background:#2563eb;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0\"><h2 style=\"margin:0\">Production deployment successful</h2><p style=\"margin:8px 0 0;opacity:0.9\">schoolpeertutor.com</p></div><div style=\"padding:24px;border:1px solid #e5e7eb\"><table><tr><td style=\"color:#6b7280\">Commit</td><td style=\"font-family:monospace\">" + $sha + "</td></tr><tr><td style=\"color:#6b7280\">Message</td><td>" + $title + "</td></tr><tr><td style=\"color:#6b7280\">CloudFront</td><td>" + $cf + "</td></tr></table><p><a href=\"https://schoolpeertutor.com\">Live site</a> · <a href=\"" + $url + "\">Workflow</a></p></div></div>")
            }')
          CODE=$(curl -sS -o /tmp/resend_cd.json -w "%{http_code}" -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          cat /tmp/resend_cd.json
          if [ "$CODE" = "200" ] || [ "$CODE" = "201" ]; then
            echo "Resend OK (HTTP $CODE)"
            exit 0
          fi
          echo "::warning::Resend HTTP $CODE — use GitHub secret RESEND_API_KEY (API key re_... from resend.com). From-address must be allowed: set RESEND_FROM_EMAIL=onboarding@resend.dev until your domain is verified."
          exit 0

      # ── Notify failure ────────────────────────────────────────────────────
      - name: Send deployment failure email
        if: failure()
        env:
          GH_SHA:     ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}
          GH_TITLE:   ${{ github.event.workflow_run.display_title || 'manual dispatch' }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA="${GH_SHA:0:7}"
          API_KEY="${RESEND_API_KEY:-$SMTP_PASS}"
          FROM="${RESEND_FROM_EMAIL:-$SMTP_FROM_EMAIL}"
          if [ -z "$API_KEY" ] || [ -z "$FROM" ] || [ -z "$SUPER_ADMIN_EMAIL" ]; then exit 0; fi
          PAYLOAD=$(jq -n \
            --arg from "SPT Admin <$FROM>" \
            --arg to "$SUPER_ADMIN_EMAIL" \
            --arg subject "DEPLOY FAILED - Production" \
            --arg sha "$SHORT_SHA" \
            --arg title "$GH_TITLE" \
            --arg url "$GH_RUN_URL" \
            '{from:$from,to:[$to],subject:$subject,html:("<div style=\"font-family:sans-serif\"><h2 style=\"color:#dc2626\">Deploy failed</h2><p>Commit: <code>" + $sha + "</code></p><p>" + $title + "</p><p><a href=\"" + $url + "\">Logs</a></p></div>")}')
          CODE=$(curl -sS -o /tmp/resend_fail.json -w "%{http_code}" -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${API_KEY}" -H "Content-Type: application/json" -d "$PAYLOAD")
          cat /tmp/resend_fail.json
          exit 0
