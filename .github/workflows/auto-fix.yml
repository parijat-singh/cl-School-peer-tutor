name: Auto-fix Dependencies

# ─────────────────────────────────────────────────────────────────────────────
# Runs automatically every Monday at 08:00 UTC, OR manually via workflow_dispatch.
# 1. Runs `npm audit fix` on frontend + Cloud Functions
# 2. If fixes are available, opens a PR automatically so you can review + merge
# 3. Notifies you by email whether fixes were found or everything was clean
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday 08:00 UTC
  workflow_dispatch:        # Also runnable manually from GitHub Actions tab

permissions:
  contents: write        # to commit the fixed package-lock.json
  pull-requests: write   # to open the auto-fix PR

jobs:
  auto-fix:
    name: "Auto-fix: npm audit fix"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT so the pushed branch can trigger CI on the new PR
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Fix frontend vulnerabilities
        id: fix-frontend
        run: |
          cd frontend
          npm ci --prefer-offline --silent
          BEFORE=$(npm audit --audit-level=none --json | jq '.metadata.vulnerabilities.total')
          npm audit fix --silent || true
          AFTER=$(npm audit --audit-level=none --json | jq '.metadata.vulnerabilities.total')
          echo "before=${BEFORE}" >> $GITHUB_OUTPUT
          echo "after=${AFTER}"   >> $GITHUB_OUTPUT
          echo "fixed=$( [ "$BEFORE" != "$AFTER" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      # ── Cloud Functions ───────────────────────────────────────────────────
      - name: Fix Cloud Functions vulnerabilities
        id: fix-functions
        run: |
          cd backend/functions
          npm ci --prefer-offline --silent
          BEFORE=$(npm audit --audit-level=none --json | jq '.metadata.vulnerabilities.total')
          npm audit fix --silent || true
          AFTER=$(npm audit --audit-level=none --json | jq '.metadata.vulnerabilities.total')
          echo "before=${BEFORE}" >> $GITHUB_OUTPUT
          echo "after=${AFTER}"   >> $GITHUB_OUTPUT
          echo "fixed=$( [ "$BEFORE" != "$AFTER" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      # ── Check if any changes were made ───────────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # ── Open a PR with the fixes ──────────────────────────────────────────
      - name: Create auto-fix PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto-fix/npm-audit-$(date +%Y%m%d)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add frontend/package-lock.json backend/functions/package-lock.json
          git commit -m "fix(deps): auto-fix npm audit vulnerabilities $(date +%Y-%m-%d)"
          git push origin "$BRANCH"

          gh pr create \
            --title "🔒 Auto-fix: npm audit vulnerabilities $(date +%Y-%m-%d)" \
            --body "## Automated dependency security fix

          This PR was created automatically by the \`auto-fix\` workflow.

          | Package set | Before | After |
          |---|---|---|
          | Frontend | ${{ steps.fix-frontend.outputs.before }} vulns | ${{ steps.fix-frontend.outputs.after }} vulns |
          | Cloud Functions | ${{ steps.fix-functions.outputs.before }} vulns | ${{ steps.fix-functions.outputs.after }} vulns |

          > ⚠️ Only safe fixes (\`npm audit fix\`) were applied — no breaking changes.
          > Review the diff, then merge to unblock CI.

          🤖 Generated by [Auto-fix workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --base master \
            --head "$BRANCH"

          echo "PR_BRANCH=$BRANCH" >> $GITHUB_ENV

      # ── Email: fixes applied ──────────────────────────────────────────────
      - name: Notify — fixes applied
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "SPT Admin <admin@schoolpeertutor.com>",
              "to": ["${{ secrets.ALERT_EMAIL }}"],
              "subject": "🔒 Auto-fix PR opened — dependency vulnerabilities patched",
              "html": "<div style=\"font-family:sans-serif;max-width:600px\"><div style=\"background:#d97706;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0\"><h2 style=\"margin:0\">🔒 Dependency Vulnerabilities Auto-Fixed</h2><p style=\"margin:8px 0 0;opacity:0.9\">A pull request has been opened for your review</p></div><div style=\"padding:24px;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px\"><p>The weekly dependency scan found and automatically fixed vulnerabilities in your npm packages. A PR has been created — please review and merge it.</p><table style=\"width:100%;border-collapse:collapse;margin:16px 0\"><tr style=\"background:#f9fafb\"><th style=\"padding:10px;text-align:left;border:1px solid #e5e7eb\">Package set</th><th style=\"padding:10px;text-align:left;border:1px solid #e5e7eb\">Before</th><th style=\"padding:10px;text-align:left;border:1px solid #e5e7eb\">After</th></tr><tr><td style=\"padding:10px;border:1px solid #e5e7eb\">Frontend</td><td style=\"padding:10px;border:1px solid #e5e7eb;color:#dc2626\">${{ steps.fix-frontend.outputs.before }} vulns</td><td style=\"padding:10px;border:1px solid #e5e7eb;color:#16a34a\">${{ steps.fix-frontend.outputs.after }} vulns</td></tr><tr><td style=\"padding:10px;border:1px solid #e5e7eb\">Cloud Functions</td><td style=\"padding:10px;border:1px solid #e5e7eb;color:#dc2626\">${{ steps.fix-functions.outputs.before }} vulns</td><td style=\"padding:10px;border:1px solid #e5e7eb;color:#16a34a\">${{ steps.fix-functions.outputs.after }} vulns</td></tr></table><div style=\"margin-top:20px\"><a href=\"${{ github.server_url }}/${{ github.repository }}/pulls\" style=\"background:#2563eb;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block\">Review PR →</a></div></div></div>"
            }'

      # ── Email: all clean ──────────────────────────────────────────────────
      - name: Notify — all clean
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "SPT Admin <admin@schoolpeertutor.com>",
              "to": ["${{ secrets.ALERT_EMAIL }}"],
              "subject": "✅ Weekly dependency scan — no vulnerabilities found",
              "html": "<div style=\"font-family:sans-serif;max-width:600px\"><div style=\"background:#16a34a;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0\"><h2 style=\"margin:0\">✅ All Dependencies Clean</h2></div><div style=\"padding:24px;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px\"><p>The weekly dependency audit found no vulnerabilities requiring fixes in either the frontend or Cloud Functions packages.</p><p style=\"color:#6b7280;font-size:13px\">Next scan: next Monday at 08:00 UTC</p></div></div>"
            }'
