name: CI

# Runs on every push and pull request to master.
# All jobs use GitHub-hosted runners — no self-hosted runner required.
# Email credentials are stored as GitHub Secrets (Settings → Secrets and variables → Actions).
# Required secrets: SMTP_PASS, SMTP_FROM_EMAIL, SUPER_ADMIN_EMAIL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  security-events: write   # needed by CodeQL to upload SARIF results

jobs:
  # ──────────────────────────────────────────────────────────────────
  # JOB 1: Secret scan - detect accidentally committed credentials
  # ──────────────────────────────────────────────────────────────────
  secret-scan:
    name: "Scan: Secrets (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: Dependency audit - known CVEs in npm packages
  # ──────────────────────────────────────────────────────────────────
  dependency-scan:
    name: "Scan: Dependencies (npm audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies
        run: |
          cd frontend
          npm ci --prefer-offline
          npm audit --audit-level=high

      - name: Audit Cloud Functions dependencies
        run: |
          cd backend/functions
          npm ci --prefer-offline
          npm audit --audit-level=high

  # ──────────────────────────────────────────────────────────────────
  # JOB 3: SAST - static analysis for security vulnerabilities in code
  # ──────────────────────────────────────────────────────────────────
  sast-scan:
    name: "Scan: SAST (CodeQL)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript
          # Covers both frontend (React/TS) and backend (Cloud Functions/TS)
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:typescript"

  # ──────────────────────────────────────────────────────────────────
  # JOB 4: E2E tests - full flow tests against Firebase emulators
  # Runs after secret-scan passes so we never run tests on a commit
  # that contains leaked credentials.
  # ──────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "Test: E2E (121 tests)"
    runs-on: ubuntu-latest
    needs: [secret-scan]

    steps:
      - uses: actions/checkout@v4

      # Firebase emulators require Java
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      # Build Cloud Functions so the emulator can run them
      - name: Install and build Cloud Functions
        run: |
          cd backend/functions
          npm ci --prefer-offline
          npm run build

      # Start all emulators in the background
      - name: Start Firebase emulators
        working-directory: backend
        run: |
          firebase emulators:start \
            --only auth,firestore,functions,storage \
            --project peertutor-dev &

          # Wait until Auth emulator is ready (up to 90 seconds)
          echo "Waiting for emulators..."
          timeout 90 bash -c '
            until curl -sf http://localhost:9099 > /dev/null 2>&1; do
              sleep 2
            done
          '
          # Also wait for Firestore (port 8090 — 8080 reserved by Apache on dev machine)
          timeout 30 bash -c '
            until curl -sf http://localhost:8090 > /dev/null 2>&1; do
              sleep 2
            done
          '
          echo "Emulators ready ✅"

      - name: Seed test data
        run: bash scripts/seed-emulator.sh

      - name: Run E2E test suite
        run: bash scripts/test-flows.sh
        # Non-zero exit = test failure = job fails = deploy blocked

  # ──────────────────────────────────────────────────────────────────
  # All jobs must pass before CD is allowed to deploy.
  # ──────────────────────────────────────────────────────────────────
  ci-passed:
    name: "CI passed"
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan, sast-scan, e2e-tests]
    steps:
      - name: All checks passed
        run: echo "All checks passed - safe to deploy"

      - name: Send CI success email
        continue-on-error: true
        env:
          GH_SHA:            ${{ github.sha }}
          GH_BRANCH:         ${{ github.ref_name }}
          GH_ACTOR:          ${{ github.actor }}
          GH_MSG:            ${{ github.event.head_commit.message }}
          GH_RUN_URL:        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          SMTP_FROM_EMAIL:   ${{ secrets.SMTP_FROM_EMAIL }}
          SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
        run: |
          SHORT_SHA="${GH_SHA:0:7}"
          # Sanitize commit message — strip newlines to avoid breaking HTML
          SAFE_MSG=$(echo "$GH_MSG" | head -1)
          HTML="<div style='font-family:sans-serif;max-width:600px'><div style='background:#16a34a;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0'><h2 style='margin:0'>CI Pipeline Passed</h2></div><div style='padding:24px;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px'><table style='width:100%;border-collapse:collapse'><tr><td style='padding:8px 0;color:#6b7280;width:140px'>Branch</td><td style='padding:8px 0;font-weight:600'>${GH_BRANCH}</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Commit</td><td style='padding:8px 0;font-family:monospace'>${SHORT_SHA}</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Author</td><td style='padding:8px 0'>${GH_ACTOR}</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Message</td><td style='padding:8px 0'>${SAFE_MSG}</td></tr></table><div style='margin-top:20px'><a href='${GH_RUN_URL}' style='background:#2563eb;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block'>View Run</a></div><p style='color:#6b7280;font-size:13px;margin-top:20px'>All 4 checks passed: Secrets scan, Dependency audit, SAST (CodeQL), E2E tests.</p></div></div>"
          RESPONSE=$(jq -n \
            --arg from    "SPT Admin <$SMTP_FROM_EMAIL>" \
            --arg to      "$SUPER_ADMIN_EMAIL" \
            --arg subject "CI Passed - $GH_BRANCH ($SHORT_SHA)" \
            --arg html    "$HTML" \
          '{from:$from,to:[$to],subject:$subject,html:$html}' \
          | curl -s --fail-with-body -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $SMTP_PASS" \
              -H "Content-Type: application/json" \
              -d @-)
          echo "$RESPONSE"

  # ──────────────────────────────────────────────────────────────────
  # NOTIFY ON FAILURE
  # ──────────────────────────────────────────────────────────────────
  notify-failure:
    name: "Notify: CI failed"
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan, sast-scan, e2e-tests]
    if: failure()
    steps:
      - name: Send failure alert email
        continue-on-error: true
        env:
          GH_SHA:            ${{ github.sha }}
          GH_BRANCH:         ${{ github.ref_name }}
          GH_ACTOR:          ${{ github.actor }}
          GH_MSG:            ${{ github.event.head_commit.message }}
          GH_RUN_URL:        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT_SECRETS:    ${{ needs.secret-scan.result }}
          RESULT_DEPS:       ${{ needs.dependency-scan.result }}
          RESULT_SAST:       ${{ needs.sast-scan.result }}
          RESULT_E2E:        ${{ needs.e2e-tests.result }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          SMTP_FROM_EMAIL:   ${{ secrets.SMTP_FROM_EMAIL }}
          SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
        run: |
          FAILED=""
          [ "$RESULT_SECRETS" = "failure" ] && FAILED="${FAILED}- Secrets scan (Gitleaks)<br>"
          [ "$RESULT_DEPS"    = "failure" ] && FAILED="${FAILED}- Dependency audit (npm audit)<br>"
          [ "$RESULT_SAST"    = "failure" ] && FAILED="${FAILED}- SAST analysis (CodeQL)<br>"
          [ "$RESULT_E2E"     = "failure" ] && FAILED="${FAILED}- E2E test suite<br>"
          SHORT_SHA="${GH_SHA:0:7}"
          SAFE_MSG=$(echo "$GH_MSG" | head -1)
          HTML="<div style='font-family:sans-serif;max-width:600px'><div style='background:#dc2626;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0'><h2 style='margin:0'>CI Pipeline Failed</h2><p style='margin:8px 0 0;opacity:0.9'>Deploy is blocked</p></div><div style='padding:24px;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px'><table style='width:100%;border-collapse:collapse'><tr><td style='padding:8px 0;color:#6b7280;width:140px'>Branch</td><td style='padding:8px 0;font-weight:600'>${GH_BRANCH}</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Commit</td><td style='padding:8px 0;font-family:monospace'>${SHORT_SHA}</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Author</td><td style='padding:8px 0'>${GH_ACTOR}</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Message</td><td style='padding:8px 0'>${SAFE_MSG}</td></tr><tr><td style='padding:8px 0;color:#6b7280;vertical-align:top'>Failed</td><td style='padding:8px 0;color:#dc2626;font-weight:600'>${FAILED}</td></tr></table><div style='margin-top:20px'><a href='${GH_RUN_URL}' style='background:#dc2626;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block'>View Failure Logs</a></div></div></div>"
          RESPONSE=$(jq -n \
            --arg from    "SPT Admin <$SMTP_FROM_EMAIL>" \
            --arg to      "$SUPER_ADMIN_EMAIL" \
            --arg subject "CI FAILED - $GH_BRANCH - Action Required" \
            --arg html    "$HTML" \
          '{from:$from,to:[$to],subject:$subject,html:$html}' \
          | curl -s --fail-with-body -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $SMTP_PASS" \
              -H "Content-Type: application/json" \
              -d @-)
          echo "$RESPONSE"
