version: "3.9"

# ─────────────────────────────────────────────────────────────────
# PeerTutor — Docker Compose
# Services: frontend (React), dynamodb-local, nginx
# ─────────────────────────────────────────────────────────────────

services:
  # ── React Frontend (Vite dev server) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: peertutor-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_COGNITO_USER_POOL_ID=${VITE_COGNITO_USER_POOL_ID}
      - VITE_COGNITO_CLIENT_ID=${VITE_COGNITO_CLIENT_ID}
      - VITE_AWS_REGION=${VITE_AWS_REGION:-us-east-1}
    depends_on:
      - dynamodb-local
    networks:
      - peertutor-net
    restart: unless-stopped

  # ── DynamoDB Local (replaces Firebase Emulators) ──────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: peertutor-dynamodb
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    networks:
      - peertutor-net
    restart: unless-stopped

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: peertutor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
    networks:
      - peertutor-net
    restart: unless-stopped

networks:
  peertutor-net:
    driver: bridge
