# nginx/nginx.conf
# Reverse proxy for PeerTutor local development and production

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile   on;
    keepalive_timeout 65;

    # Upstream services
    upstream frontend {
        server frontend:5173;
    }
    upstream firebase {
        server firebase-emulators:5001;
    }
    upstream emulator_ui {
        server firebase-emulators:4000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"                   always;
        add_header X-Content-Type-Options "nosniff"                      always;
        add_header X-XSS-Protection       "1; mode=block"                always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # Frontend (React dev server)
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Firebase Functions API
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://firebase/;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Firebase Emulator UI (dev only)
        location /emulator/ {
            proxy_pass         http://emulator_ui/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
