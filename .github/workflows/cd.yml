name: CD - Deploy to Production

# ─────────────────────────────────────────────────────────────────────────────
# Runs on YOUR machine (self-hosted runner) - no secrets stored in GitHub.
# All credentials are read from .env.production on your local filesystem.
#
# Triggers automatically after the CI workflow passes on master.
# 1. Loads .env.production from your machine's repo root
# 2. Builds the React frontend with production Firebase config
# 3. Syncs built assets to S3 (hashed files: long cache; index.html: no-cache)
# 4. Invalidates CloudFront so changes go live within ~60 seconds
# 5. Deploys Firebase Functions + Firestore rules
# 6. Sends a success or failure email via Resend (SMTP_PASS read locally)
#
# Setup (one-time):
#   See docs/self-hosted-runner-setup.md
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  # Manual trigger — use when the self-hosted runner was offline when CI
  # completed and the workflow_run event was missed.
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy (leave blank for latest master)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  deploy:
    name: "Deploy: S3 + CloudFront + Firebase"
    # !! Runs on your machine - not GitHub's servers !!
    runs-on: self-hosted
    # Auto-trigger: only deploy when CI passed.
    # Manual trigger (workflow_dispatch): always deploy — operator is responsible.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        shell: powershell

    steps:
      # ── Checkout the exact commit that passed CI ───────────────────────────
      - uses: actions/checkout@v4
        with:
          # workflow_run: use the SHA that passed CI.
          # workflow_dispatch: use the provided SHA or fall back to HEAD.
          ref: ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}

      # ── Load secrets from local .env.production ────────────────────────────
      # This file lives only on your machine and is never committed to git.
      - name: Load .env.production
        run: |
          $candidates = @(
            "$env:USERPROFILE\OneDrive\Documents\Coding\cl-School-peer-tutor\.env.production",
            "C:\Users\user\OneDrive\Documents\Coding\cl-School-peer-tutor\.env.production"
          )
          $envFile = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $envFile) {
            Write-Error "ERROR: .env.production not found. Checked: $($candidates -join ', ')"
            exit 1
          }
          Get-Content $envFile | ForEach-Object {
            if ($_ -match '^\s*#' -or [string]::IsNullOrWhiteSpace($_)) { return }
            Add-Content -Path $env:GITHUB_ENV -Value $_
          }
          Write-Host "✅ .env.production loaded from $envFile"

      # ── Build frontend ─────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Build frontend
        working-directory: frontend
        run: |
          $env:VITE_FIREBASE_API_KEY             = $env:FIREBASE_API_KEY
          $env:VITE_FIREBASE_AUTH_DOMAIN         = $env:FIREBASE_AUTH_DOMAIN
          $env:VITE_FIREBASE_PROJECT_ID          = $env:FIREBASE_PROJECT_ID
          $env:VITE_FIREBASE_STORAGE_BUCKET      = $env:FIREBASE_STORAGE_BUCKET
          $env:VITE_FIREBASE_MESSAGING_SENDER_ID = $env:FIREBASE_MESSAGING_SENDER_ID
          $env:VITE_FIREBASE_APP_ID              = $env:FIREBASE_APP_ID
          $env:VITE_USE_EMULATORS                = "false"
          npm run build

      # ── Deploy to S3 ──────────────────────────────────────────────────────
      - name: Sync hashed assets to S3 (long-lived cache)
        run: |
          aws s3 sync frontend/dist/ "s3://$env:S3_BUCKET/" `
            --profile $env:AWS_PROFILE `
            --delete `
            --cache-control "max-age=31536000,immutable" `
            --exclude "index.html" `
            --exclude "*.map"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp frontend/dist/index.html "s3://$env:S3_BUCKET/index.html" `
            --profile $env:AWS_PROFILE `
            --cache-control "no-cache,no-store,must-revalidate" `
            --content-type "text/html"

      # ── Invalidate CloudFront ─────────────────────────────────────────────
      - name: Invalidate CloudFront cache
        id: invalidate
        run: |
          $id = aws cloudfront create-invalidation `
            --profile $env:AWS_PROFILE `
            --distribution-id $env:CLOUDFRONT_DISTRIBUTION_ID `
            --paths "/*" `
            --query "Invalidation.Id" `
            --output text
          "invalidation_id=$id" | Add-Content -Path $env:GITHUB_OUTPUT
          Write-Host "CloudFront invalidation: $id"

      # ── Deploy Firebase Functions + rules ────────────────────────────────
      - name: Install Cloud Functions dependencies
        working-directory: backend/functions
        run: npm ci --prefer-offline

      - name: Build Cloud Functions
        working-directory: backend/functions
        run: npm run build

      - name: Verify functions build output
        run: |
          if (-not (Test-Path "backend/functions/lib/index.js")) {
            Write-Error "Functions build output not found at backend/functions/lib/index.js"
            exit 1
          }
          Write-Host "Functions build output verified"

      - name: Deploy to Firebase
        working-directory: backend
        run: |
          $env:FUNCTIONS_DISCOVERY_TIMEOUT = "120"
          firebase deploy `
            --only "functions,firestore:rules,storage" `
            --project $env:FIREBASE_PROJECT_ID `
            --non-interactive

      # ── Notify success ────────────────────────────────────────────────────
      - name: Send deployment success email
        if: success()
        env:
          GH_SHA:     ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}
          GH_TITLE:   ${{ github.event.workflow_run.display_title || 'manual dispatch' }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CF_ID:      ${{ steps.invalidate.outputs.invalidation_id }}
        run: |
          $shortSha = $env:GH_SHA.Substring(0, 7)
          $body = @{
            from    = "SPT Admin <$env:SMTP_FROM_EMAIL>"
            to      = @($env:SUPER_ADMIN_EMAIL)
            subject = "Deployed to Production - $shortSha"
            html    = "<div style='font-family:sans-serif;max-width:600px'><div style='background:#2563eb;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0'><h2 style='margin:0'>Production Deployment Successful</h2><p style='margin:8px 0 0;opacity:0.9'>schoolpeertutor.com is now live</p></div><div style='padding:24px;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px'><table style='width:100%;border-collapse:collapse'><tr><td style='padding:8px 0;color:#6b7280;width:160px'>Commit</td><td style='padding:8px 0;font-family:monospace'>$shortSha</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Message</td><td style='padding:8px 0'>$env:GH_TITLE</td></tr><tr><td style='padding:8px 0;color:#6b7280'>CloudFront ID</td><td style='padding:8px 0'>$env:CF_ID</td></tr></table><div style='margin-top:20px'><a href='https://schoolpeertutor.com' style='background:#2563eb;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block'>View Live Site</a></div></div></div>"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.resend.com/emails" `
            -Method POST `
            -Headers @{ Authorization = "Bearer $env:SMTP_PASS"; "Content-Type" = "application/json" } `
            -Body $body

      # ── Notify failure ────────────────────────────────────────────────────
      - name: Send deployment failure email
        if: failure()
        env:
          GH_SHA:     ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}
          GH_TITLE:   ${{ github.event.workflow_run.display_title || 'manual dispatch' }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $shortSha = $env:GH_SHA.Substring(0, 7)
          $body = @{
            from    = "SPT Admin <$env:SMTP_FROM_EMAIL>"
            to      = @($env:SUPER_ADMIN_EMAIL)
            subject = "DEPLOY FAILED - Production deployment error"
            html    = "<div style='font-family:sans-serif;max-width:600px'><div style='background:#dc2626;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0'><h2 style='margin:0'>Production Deployment Failed</h2><p style='margin:8px 0 0;opacity:0.9'>CI passed but deploy failed - site is unchanged</p></div><div style='padding:24px;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px'><p>Commit: $shortSha</p><p>Message: $env:GH_TITLE</p><a href='$env:GH_RUN_URL' style='background:#dc2626;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block'>View Failure Logs</a></div></div>"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.resend.com/emails" `
            -Method POST `
            -Headers @{ Authorization = "Bearer $env:SMTP_PASS"; "Content-Type" = "application/json" } `
            -Body $body
