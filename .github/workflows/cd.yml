name: CD — Deploy to Production

# ─────────────────────────────────────────────────────────────────────────────
# Triggers automatically after the CI workflow passes on master.
# 1. Builds the React frontend with production Firebase config
# 2. Syncs built assets to S3 (hashed files: long cache; index.html: no-cache)
# 3. Invalidates CloudFront so changes go live within ~60 seconds
# 4. Deploys Firebase Functions + Firestore rules
# 5. Sends a success or failure email notification
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

permissions:
  contents: read

jobs:
  deploy:
    name: "Deploy: S3 + CloudFront + Firebase"
    runs-on: ubuntu-latest
    # Only run when CI passed — never deploy a broken build
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # ── Node setup ────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── AWS credentials ───────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── Build frontend ─────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci --prefer-offline
        working-directory: frontend

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY:              ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:          ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:           ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:       ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:               ${{ secrets.FIREBASE_APP_ID }}
          VITE_USE_EMULATORS:                 "false"
        run: npm run build

      # ── Deploy to S3 ──────────────────────────────────────────────────────
      - name: Sync hashed assets to S3 (long-lived cache)
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.map"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp frontend/dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      # ── Invalidate CloudFront ─────────────────────────────────────────────
      - name: Invalidate CloudFront cache
        id: invalidate
        run: |
          ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation_id=$ID" >> $GITHUB_OUTPUT
          echo "CloudFront invalidation: $ID"

      # ── Deploy Firebase Functions ─────────────────────────────────────────
      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Install Cloud Functions dependencies
        run: npm ci --prefer-offline
        working-directory: backend/functions

      - name: Build Cloud Functions
        run: npm run build
        working-directory: backend/functions

      - name: Deploy Firebase Functions + Firestore rules
        working-directory: backend
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy \
            --only functions,firestore:rules,storage \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --non-interactive \
            --token "$FIREBASE_TOKEN"

      # ── Notify success ────────────────────────────────────────────────────
      - name: Send deployment success email
        if: success()
        run: |
          SHORT_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "SPT Admin <admin@schoolpeertutor.com>",
              "to": ["${{ secrets.ALERT_EMAIL }}"],
              "subject": "🚀 Deployed to Production — '"$SHORT_SHA"'",
              "html": "<div style=\"font-family:sans-serif;max-width:600px\"><div style=\"background:#2563eb;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0\"><h2 style=\"margin:0\">🚀 Production Deployment Successful</h2><p style=\"margin:8px 0 0;opacity:0.9\">schoolpeertutor.com is now live with the latest changes</p></div><div style=\"padding:24px;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px\"><table style=\"width:100%;border-collapse:collapse\"><tr><td style=\"padding:8px 0;color:#6b7280;width:160px\">Commit</td><td style=\"padding:8px 0;font-family:monospace\">'"$SHORT_SHA"'</td></tr><tr><td style=\"padding:8px 0;color:#6b7280\">Branch</td><td style=\"padding:8px 0;font-weight:600\">master</td></tr><tr><td style=\"padding:8px 0;color:#6b7280\">Deployed by</td><td style=\"padding:8px 0\">GitHub Actions (auto)</td></tr><tr><td style=\"padding:8px 0;color:#6b7280\">CloudFront</td><td style=\"padding:8px 0\">${{ steps.invalidate.outputs.invalidation_id }}</td></tr><tr><td style=\"padding:8px 0;color:#6b7280\">Commit message</td><td style=\"padding:8px 0\">${{ github.event.workflow_run.display_title }}</td></tr></table><div style=\"margin-top:20px;display:flex;gap:12px\"><a href=\"https://schoolpeertutor.com\" style=\"background:#2563eb;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block\">View Live Site →</a>&nbsp;&nbsp;<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\" style=\"background:#f3f4f6;color:#111;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block\">View Deploy Logs</a></div></div></div>"
            }'

      # ── Notify failure ────────────────────────────────────────────────────
      - name: Send deployment failure email
        if: failure()
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "SPT Admin <admin@schoolpeertutor.com>",
              "to": ["${{ secrets.ALERT_EMAIL }}"],
              "subject": "🔥 DEPLOY FAILED — Production deployment error",
              "html": "<div style=\"font-family:sans-serif;max-width:600px\"><div style=\"background:#dc2626;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0\"><h2 style=\"margin:0\">🔥 Production Deployment Failed</h2><p style=\"margin:8px 0 0;opacity:0.9\">CI passed but deploy to production failed — site unchanged</p></div><div style=\"padding:24px;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px\"><table style=\"width:100%;border-collapse:collapse\"><tr><td style=\"padding:8px 0;color:#6b7280;width:160px\">Commit</td><td style=\"padding:8px 0;font-family:monospace\">${{ github.event.workflow_run.head_sha }}</td></tr><tr><td style=\"padding:8px 0;color:#6b7280\">Commit message</td><td style=\"padding:8px 0\">${{ github.event.workflow_run.display_title }}</td></tr></table><div style=\"margin-top:20px\"><a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\" style=\"background:#dc2626;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block\">View Failure Logs →</a></div></div></div>"
            }'
