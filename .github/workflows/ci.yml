name: CI

# Runs on every push and pull request to master.
# No production secrets are used here - deployment is done locally via scripts/deploy.sh.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  security-events: write   # needed by CodeQL to upload SARIF results

# ── Reusable notification step (called on every failed job) ────────────────
# Sends a rich HTML email via Resend API to ALERT_EMAIL with:
#   - which job failed, which branch/commit, direct link to the run logs

jobs:
  # ──────────────────────────────────────────────────────────────────
  # JOB 1: Secret scan - detect accidentally committed credentials
  # ──────────────────────────────────────────────────────────────────
  secret-scan:
    name: "Scan: Secrets (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: Dependency audit - known CVEs in npm packages
  # ──────────────────────────────────────────────────────────────────
  dependency-scan:
    name: "Scan: Dependencies (npm audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies
        run: |
          cd frontend
          npm ci --prefer-offline
          npm audit --audit-level=high

      - name: Audit Cloud Functions dependencies
        run: |
          cd backend/functions
          npm ci --prefer-offline
          npm audit --audit-level=high

  # ──────────────────────────────────────────────────────────────────
  # JOB 3: SAST - static analysis for security vulnerabilities in code
  # ──────────────────────────────────────────────────────────────────
  sast-scan:
    name: "Scan: SAST (CodeQL)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript
          # Covers both frontend (React/TS) and backend (Cloud Functions/TS)
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:typescript"

  # ──────────────────────────────────────────────────────────────────
  # JOB 4: E2E tests - full flow tests against Firebase emulators
  # Runs after secret-scan passes so we never run tests on a commit
  # that contains leaked credentials.
  # ──────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "Test: E2E (87 tests)"
    runs-on: ubuntu-latest
    needs: [secret-scan]

    steps:
      - uses: actions/checkout@v4

      # Firebase emulators require Java
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      # Build Cloud Functions so the emulator can run them
      - name: Install and build Cloud Functions
        run: |
          cd backend/functions
          npm ci --prefer-offline
          npm run build

      # Start all emulators in the background
      - name: Start Firebase emulators
        working-directory: backend
        run: |
          firebase emulators:start \
            --only auth,firestore,functions,storage \
            --project peertutor-dev &

          # Wait until Auth emulator is ready (up to 90 seconds)
          echo "Waiting for emulators..."
          timeout 90 bash -c '
            until curl -sf http://localhost:9099 > /dev/null 2>&1; do
              sleep 2
            done
          '
          # Also wait for Firestore
          timeout 30 bash -c '
            until curl -sf http://localhost:8080 > /dev/null 2>&1; do
              sleep 2
            done
          '
          echo "Emulators ready ✅"

      - name: Seed test data
        run: bash scripts/seed-emulator.sh

      - name: Run E2E test suite
        run: bash scripts/test-flows.sh
        # Non-zero exit = test failure = job fails = deploy blocked

  # ──────────────────────────────────────────────────────────────────
  # All jobs must pass. Deploy is done locally via scripts/deploy.sh
  # after you confirm this workflow is green.
  # ──────────────────────────────────────────────────────────────────
  ci-passed:
    name: "CI passed"
    # Runs on your machine so it can read .env.production for email credentials
    runs-on: self-hosted
    needs: [secret-scan, dependency-scan, sast-scan, e2e-tests]
    defaults:
      run:
        shell: powershell
    steps:
      - name: All checks passed
        run: Write-Host "All checks passed - safe to deploy"

      - name: Load .env.production
        run: |
          $candidates = @(
            "$env:USERPROFILE\OneDrive\Documents\Coding\cl-School-peer-tutor\.env.production",
            "C:\Users\user\OneDrive\Documents\Coding\cl-School-peer-tutor\.env.production"
          )
          $envFile = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $envFile) {
            Write-Error "ERROR: .env.production not found. Checked: $($candidates -join ', ')"
            exit 1
          }
          Get-Content $envFile | ForEach-Object {
            if ($_ -match '^\s*#' -or [string]::IsNullOrWhiteSpace($_)) { return }
            Add-Content -Path $env:GITHUB_ENV -Value $_
          }
          Write-Host "✅ Loaded secrets from $envFile"

      - name: Notify success
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $body = @{
            from    = "SPT Admin <$env:SMTP_FROM_EMAIL>"
            to      = @($env:SUPER_ADMIN_EMAIL)
            subject = "✅ CI Passed - ${{ github.ref_name }} ($shortSha)"
            html    = "<div style='font-family:sans-serif;max-width:600px'><div style='background:#16a34a;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0'><h2 style='margin:0'>✅ CI Pipeline Passed</h2></div><div style='padding:24px;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px'><table style='width:100%;border-collapse:collapse'><tr><td style='padding:8px 0;color:#6b7280;width:140px'>Branch</td><td style='padding:8px 0;font-weight:600'>${{ github.ref_name }}</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Commit</td><td style='padding:8px 0;font-family:monospace'>$shortSha</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Author</td><td style='padding:8px 0'>${{ github.actor }}</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Message</td><td style='padding:8px 0'>${{ github.event.head_commit.message }}</td></tr></table><div style='margin-top:20px'><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' style='background:#2563eb;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block'>View Run →</a></div><p style='color:#6b7280;font-size:13px;margin-top:20px'>All 4 checks passed: Secrets scan, Dependency audit, SAST (CodeQL), E2E tests.</p></div></div>"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.resend.com/emails" `
            -Method POST `
            -Headers @{ Authorization = "Bearer $env:SMTP_PASS"; "Content-Type" = "application/json" } `
            -Body $body

  # ──────────────────────────────────────────────────────────────────
  # NOTIFY ON FAILURE - runs on your machine so it can read
  # .env.production for email credentials without storing in GitHub.
  # ──────────────────────────────────────────────────────────────────
  notify-failure:
    name: "Notify: CI failed"
    runs-on: self-hosted
    needs: [secret-scan, dependency-scan, sast-scan, e2e-tests]
    if: failure()
    defaults:
      run:
        shell: powershell
    steps:
      - name: Load .env.production
        run: |
          $candidates = @(
            "$env:USERPROFILE\OneDrive\Documents\Coding\cl-School-peer-tutor\.env.production",
            "C:\Users\user\OneDrive\Documents\Coding\cl-School-peer-tutor\.env.production"
          )
          $envFile = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $envFile) {
            Write-Error "ERROR: .env.production not found."
            exit 1
          }
          Get-Content $envFile | ForEach-Object {
            if ($_ -match '^\s*#' -or [string]::IsNullOrWhiteSpace($_)) { return }
            Add-Content -Path $env:GITHUB_ENV -Value $_
          }

      - name: Send failure alert email
        run: |
          $failed = @()
          if ("${{ needs.secret-scan.result }}"     -eq "failure") { $failed += "• Secrets scan (Gitleaks)" }
          if ("${{ needs.dependency-scan.result }}" -eq "failure") { $failed += "• Dependency audit (npm audit)" }
          if ("${{ needs.sast-scan.result }}"       -eq "failure") { $failed += "• SAST analysis (CodeQL)" }
          if ("${{ needs.e2e-tests.result }}"       -eq "failure") { $failed += "• E2E test suite" }
          $failedHtml = ($failed | ForEach-Object { "$_<br>" }) -join ""
          $shortSha   = "${{ github.sha }}".Substring(0, 7)
          $body = @{
            from    = "SPT Admin <$env:SMTP_FROM_EMAIL>"
            to      = @($env:SUPER_ADMIN_EMAIL)
            subject = "🚨 CI FAILED - ${{ github.ref_name }} - Action Required"
            html    = "<div style='font-family:sans-serif;max-width:600px'><div style='background:#dc2626;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0'><h2 style='margin:0'>🚨 CI Pipeline Failed</h2><p style='margin:8px 0 0;opacity:0.9'>Immediate action required - deploy is blocked</p></div><div style='padding:24px;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px'><table style='width:100%;border-collapse:collapse'><tr><td style='padding:8px 0;color:#6b7280;width:140px'>Branch</td><td style='padding:8px 0;font-weight:600'>${{ github.ref_name }}</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Commit</td><td style='padding:8px 0;font-family:monospace'>$shortSha</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Author</td><td style='padding:8px 0'>${{ github.actor }}</td></tr><tr><td style='padding:8px 0;color:#6b7280'>Message</td><td style='padding:8px 0'>${{ github.event.head_commit.message }}</td></tr><tr><td style='padding:8px 0;color:#6b7280;vertical-align:top'>Failed checks</td><td style='padding:8px 0;color:#dc2626;font-weight:600'>$failedHtml</td></tr></table><div style='margin-top:20px'><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' style='background:#dc2626;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block'>View Failure Logs →</a></div></div></div>"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.resend.com/emails" `
            -Method POST `
            -Headers @{ Authorization = "Bearer $env:SMTP_PASS"; "Content-Type" = "application/json" } `
            -Body $body
