version: "3.9"

# ─────────────────────────────────────────────────────────────────
# PeerTutor — Production Compose Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# ─────────────────────────────────────────────────────────────────

services:
  frontend:
    build:
      target: production
    ports:
      - "5173:80"  # Nginx serves built assets inside container

  dynamodb-local:
    # In production, use real DynamoDB — exclude local from prod
    profiles:
      - dev-only

  nginx:
    environment:
      - DOMAIN=${DOMAIN:-peertutor.app}
