version: "3.9"

# ─────────────────────────────────────────────────────────────────
# PeerTutor — Docker Compose
# Services: frontend (React), backend (Firebase emulators), nginx
# ─────────────────────────────────────────────────────────────────

services:
  # ── React Frontend (Vite dev server) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: peertutor-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_FIREBASE_API_KEY=${FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${FIREBASE_APP_ID}
      - VITE_USE_EMULATORS=true
      - VITE_EMULATOR_HOST=localhost
    depends_on:
      - firebase-emulators
    networks:
      - peertutor-net
    restart: unless-stopped

  # ── Firebase Emulators (Auth, Firestore, Functions, Storage) ──
  firebase-emulators:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peertutor-firebase
    ports:
      - "4000:4000"   # Emulator UI
      - "5001:5001"   # Functions
      - "8080:8080"   # Firestore
      - "9099:9099"   # Auth
      - "9199:9199"   # Storage
    volumes:
      - ./backend:/app
      - /app/functions/node_modules
      - firebase-data:/app/.firebase-data
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - GOOGLE_CALENDAR_CLIENT_EMAIL=${GOOGLE_CALENDAR_CLIENT_EMAIL}
      - GOOGLE_CALENDAR_PRIVATE_KEY=${GOOGLE_CALENDAR_PRIVATE_KEY}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
    networks:
      - peertutor-net
    restart: unless-stopped

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: peertutor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - firebase-emulators
    networks:
      - peertutor-net
    restart: unless-stopped

networks:
  peertutor-net:
    driver: bridge

volumes:
  firebase-data:
    driver: local
